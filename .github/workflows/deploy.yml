name: Deploy to Cloud Run

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation auth

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REPO: ragbot-repo

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push backend image
        run: |
          docker build -f Dockerfile.backend \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/netsol-chatbot-backend:${{ github.sha }} .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/netsol-chatbot-backend:${{ github.sha }}

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy netsol-chatbot-backend \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/netsol-chatbot-backend:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 8Gi \
            --cpu 4 \
            --cpu-boost \
            --timeout 600 \
            --set-env-vars OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }},MONGO_URI=${{ secrets.MONGO_URI }},MODEL=${{ secrets.MODEL }},EMBEDDING_MODEL=${{ secrets.EMBEDDING_MODEL }},EMBEDDINGS_URL=${{ secrets.EMBEDDINGS_URL }},DEEPGRAM_API_KEY=${{ secrets.DEEPGRAM_API_KEY }},CHROMA_GCS_BUCKET=ragbot-chromadb-pivotal-mile,LANGFUSE_PUBLIC_KEY=${{ secrets.LANGFUSE_PUBLIC_KEY }},LANGFUSE_SECRET_KEY=${{ secrets.LANGFUSE_SECRET_KEY }},LANGFUSE_HOST=https://cloud.langfuse.com

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Get backend URL
        id: backend_url
        run: |
          URL=$(gcloud run services describe netsol-chatbot-backend --region ${{ env.REGION }} --format='value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        run: |
          docker build -f Dockerfile.frontend \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/netsol-chatbot-frontend:${{ github.sha }} .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/netsol-chatbot-frontend:${{ github.sha }}

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy netsol-chatbot-frontend \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/netsol-chatbot-frontend:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 2Gi \
            --set-env-vars BACKEND_URL=${{ steps.backend_url.outputs.url }}